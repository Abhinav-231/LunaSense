<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunaSense — Live System Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07080c;
  --surface: #0d0f17;
  --s2:      #13161f;
  --s3:      #191d29;
  --border:  rgba(255,255,255,0.06);
  --gold:    #e8c14a;
  --cyan:    #3dd9f5;
  --green:   #32e87a;
  --red:     #ff3d5a;
  --blue:    #3b82f6;
  --purple:  #a855f7;
  --orange:  #f97316;
  --text:    #dde2f0;
  --muted:   #3d4358;
  --muted2:  #5a6278;
  --mono:    'DM Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --body:    'Outfit', sans-serif;
}

html, body { height: 100%; overflow-x: hidden; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(232,193,74,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,193,74,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* HEADER */
header {
  position: relative; z-index: 10;
  padding: 1.5rem 2.5rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.logo { font-family: var(--display); font-size: 2rem; letter-spacing: 0.08em; color: var(--gold); }
.logo span { color: var(--text); }
.logo sub { font-family: var(--body); font-size: 0.55rem; color: var(--muted2); letter-spacing: 0.2em; display: block; margin-top: -4px; }

.header-right { display: flex; gap: 12px; align-items: center; }

.status-pill {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--muted2);
  border: 1px solid var(--border); padding: 6px 14px;
  border-radius: 2px; letter-spacing: 0.1em;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* TAB BAR */
.tab-bar {
  position: relative; z-index: 5;
  display: flex; border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 12px 28px; font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.15em; color: var(--muted2); cursor: pointer;
  border: none; background: none; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* MAIN LAYOUT */
.main {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 380px;
  height: calc(100vh - 120px);
}

/* ROOM SCENE */
.room-wrap {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.room-label {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.room-label span { color: var(--muted2); }
.room-scene { flex: 1; position: relative; overflow: hidden; }

/* Light glow */
.light-glow {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 360px; height: 360px; border-radius: 50%;
  opacity: 0; transition: opacity 1.2s ease, background 0.8s ease;
  pointer-events: none;
}
.light-glow.on { opacity: 1; }
.light-glow.warm  { background: radial-gradient(circle, rgba(232,193,74,0.35) 0%, transparent 70%); }
.light-glow.cool  { background: radial-gradient(circle, rgba(61,217,245,0.28) 0%, transparent 70%); }
.light-glow.dim   { background: radial-gradient(circle, rgba(232,120,50,0.22) 0%, transparent 70%); }
.light-glow.alert { background: radial-gradient(circle, rgba(255,61,90,0.35) 0%, transparent 70%); animation: glow-pulse 0.6s ease-in-out infinite alternate; }
.light-glow.pastel { background: radial-gradient(circle, rgba(189,178,255,0.3) 0%, transparent 70%); }
@keyframes glow-pulse { from{opacity:0.7} to{opacity:1} }

/* AC cold air streams */
.ac-unit {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 180px; height: 20px;
  background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.2);
  border-radius: 0 0 8px 8px; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.5s;
}
.ac-unit.on { opacity: 1; }
.ac-unit-label { font-family: var(--mono); font-size: 9px; color: rgba(61,217,245,0.8); letter-spacing: 0.1em; }

.ac-stream {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; opacity: 0; transition: opacity 0.5s;
}
.ac-stream.on { opacity: 1; }
.stream-line {
  width: 2px; border-radius: 1px;
  background: linear-gradient(to bottom, rgba(61,217,245,0.6), transparent);
  animation: stream-flow 1.5s ease-in-out infinite;
}
.stream-line:nth-child(1) { height: 80px; animation-delay: 0s; }
.stream-line:nth-child(2) { height: 110px; animation-delay: 0.2s; }
.stream-line:nth-child(3) { height: 90px; animation-delay: 0.4s; }
.stream-line:nth-child(4) { height: 100px; animation-delay: 0.1s; }
.stream-line:nth-child(5) { height: 75px; animation-delay: 0.3s; }
@keyframes stream-flow { 0%,100%{opacity:0.8;transform:scaleY(1)} 50%{opacity:0.4;transform:scaleY(0.85)} }

/* Temp display */
.temp-display {
  position: absolute; top: 140px; left: 50%; transform: translateX(-50%);
  font-family: var(--display); font-size: 4rem; color: rgba(61,217,245,0.15);
  letter-spacing: 0.05em; transition: all 0.8s ease; pointer-events: none;
  white-space: nowrap;
}
.temp-display.on { color: rgba(61,217,245,0.5); }

/* LED strip */
.led-strip {
  position: absolute; top: 0; left: 10%; right: 10%;
  height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden;
}
.led-fill {
  height: 100%; width: 0%; border-radius: 2px;
  transition: width 1s ease, background 0.8s ease;
}
.led-fill.on.warm  { width: 75%; background: var(--gold); box-shadow: 0 0 12px var(--gold); }
.led-fill.on.cool  { width: 90%; background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }
.led-fill.on.pastel{ width: 60%; background: #BDB2FF; box-shadow: 0 0 12px #BDB2FF; }
.led-fill.on.alert { width: 100%; background: var(--red); animation: flash 0.4s infinite; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Floor */
.room-floor {
  position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
  background: linear-gradient(to top, rgba(255,255,255,0.015), transparent);
  border-top: 1px solid rgba(255,255,255,0.03);
}
.furniture-desk {
  position: absolute; bottom: 30%; right: 15%; width: 130px; height: 8px;
  background: rgba(255,255,255,0.06); border-radius: 2px;
}
.furniture-desk::before, .furniture-desk::after {
  content: ''; position: absolute; bottom: 0; width: 6px; height: 44px;
  background: rgba(255,255,255,0.04);
}
.furniture-desk::before { left: 10px; }
.furniture-desk::after  { right: 10px; }
.furniture-bed {
  position: absolute; bottom: 30%; left: 8%; width: 110px; height: 55px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 4px 4px 2px 2px;
}

/* Person */
.person {
  position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%);
  transition: all 0.8s ease; opacity: 0;
}
.person.visible { opacity: 1; }
.person.at-desk { left: 72%; bottom: 38%; }
.person-body { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.person-head { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
.person-torso { width: 28px; height: 34px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px 4px 2px 2px; }
.person-legs { display: flex; gap: 4px; }
.person-leg  { width: 10px; height: 26px; background: rgba(255,255,255,0.08); border-radius: 0 0 3px 3px; }

/* Sensor overlays */
.pir-cone {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 110px solid transparent; border-right: 110px solid transparent;
  border-top: 190px solid rgba(232,193,74,0.05);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.pir-cone.active { opacity: 1; }

.radar-ring {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 20px; border-radius: 50%;
  border: 1px solid rgba(61,217,245,0.3); opacity: 0; pointer-events: none;
}
.radar-ring.active { animation: radar-expand 2s ease-out infinite; }
@keyframes radar-expand {
  0%   { width: 20px; height: 20px; opacity: 0.8; }
  100% { width: 380px; height: 380px; opacity: 0; margin-left: -180px; margin-top: -180px; }
}

/* Sensor badges */
.sensor-badges { position: absolute; bottom: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px; }
.sensor-badge {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 2px;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted2);
  transition: all 0.3s;
}
.sensor-badge.active.badge-pir   { color: var(--gold); border-color: rgba(232,193,74,0.3); background: rgba(232,193,74,0.08); }
.sensor-badge.active.badge-radar { color: var(--cyan); border-color: rgba(61,217,245,0.3); background: rgba(61,217,245,0.08); }
.sensor-badge.active.badge-ac    { color: var(--blue); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }

/* Light mode label */
.mode-label {
  position: absolute; top: 28px; right: 12px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em;
  color: var(--muted); transition: color 0.5s;
}

/* SCENARIO BUTTONS */
.scenario-strip {
  position: relative; z-index: 5;
  padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.scenario-strip-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.15em; align-self: center; margin-right: 4px; }
.scenario-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 6px 14px; border-radius: 2px;
  border: 1px solid var(--border); background: transparent; color: var(--muted2);
  cursor: pointer; transition: all 0.2s;
}
.scenario-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.scenario-btn.active.light-scenario { color: var(--gold); border-color: rgba(232,193,74,0.4); background: rgba(232,193,74,0.06); }
.scenario-btn.active.ac-scenario    { color: var(--cyan); border-color: rgba(61,217,245,0.4); background: rgba(61,217,245,0.06); }

/* RIGHT PANEL */
.right-panel {
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--surface);
}

/* Flow chart */
.flow-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.flow-title { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 10px; }
.flow-nodes { display: flex; flex-direction: column; gap: 4px; }
.flow-node {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--s2);
  transition: all 0.3s;
}
.flow-node.active { border-color: rgba(255,255,255,0.12); background: var(--s3); }
.flow-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.3s; }
.flow-node.active .flow-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
.flow-dot.pir   { }
.flow-dot.radar { }
.flow-dot.esp   { }
.flow-dot.ac    { }
.flow-dot.led   { }
.flow-node.active.node-pir   .flow-dot { background: var(--gold);   box-shadow: 0 0 6px var(--gold); }
.flow-node.active.node-radar .flow-dot { background: var(--cyan);   box-shadow: 0 0 6px var(--cyan); }
.flow-node.active.node-esp   .flow-dot { background: var(--green);  box-shadow: 0 0 6px var(--green); }
.flow-node.active.node-ac    .flow-dot { background: var(--blue);   box-shadow: 0 0 6px var(--blue); }
.flow-node.active.node-led   .flow-dot { background: var(--gold);   box-shadow: 0 0 6px var(--gold); }
.flow-name { font-family: var(--mono); font-size: 10px; color: var(--muted2); letter-spacing: 0.1em; flex: 1; transition: color 0.3s; }
.flow-node.active .flow-name { color: var(--text); }
.flow-value { font-family: var(--mono); font-size: 10px; color: var(--muted); transition: color 0.3s; }
.flow-node.active .flow-value { color: var(--green); }
.flow-node.active.node-pir   .flow-value { color: var(--gold); }
.flow-node.active.node-radar .flow-value { color: var(--cyan); }
.flow-node.active.node-ac    .flow-value { color: var(--blue); }

.flow-connector { width: 1px; height: 8px; background: var(--border); margin-left: 14px; }
.flow-connector.active { background: rgba(50,232,122,0.3); }

/* AC status section */
.ac-status-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.ac-status-row { display: flex; gap: 8px; }
.ac-stat {
  flex: 1; padding: 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--s2); text-align: center;
}
.ac-stat-val { font-family: var(--display); font-size: 1.6rem; color: var(--muted2); letter-spacing: 0.05em; transition: color 0.5s; }
.ac-stat-val.on { color: var(--cyan); }
.ac-stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.1em; margin-top: 2px; }

/* Log */
.log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.log-header { padding: 10px 16px; font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.2em; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.log-clear { cursor: pointer; color: var(--muted); transition: color 0.2s; }
.log-clear:hover { color: var(--text); }
.log-body { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 4px; }
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-track { background: transparent; }
.log-body::-webkit-scrollbar-thumb { background: var(--muted); }

.log-entry {
  display: flex; gap: 8px; align-items: flex-start;
  font-family: var(--mono); font-size: 11px; color: var(--muted2);
  animation: log-in 0.2s ease;
}
@keyframes log-in { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }
.log-time { color: var(--muted); flex-shrink: 0; }
.log-msg  { flex: 1; line-height: 1.4; }
.log-entry.type-pir   .log-msg { color: rgba(232,193,74,0.85); }
.log-entry.type-radar .log-msg { color: rgba(61,217,245,0.85); }
.log-entry.type-ac    .log-msg { color: rgba(59,130,246,0.85); }
.log-entry.type-light .log-msg { color: rgba(255,255,255,0.7); }
.log-entry.type-alert .log-msg { color: var(--red); }

/* State badge */
.state-badge {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%) translateY(-4px);
  background: var(--s2); border: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 5px 14px; border-radius: 2px; color: var(--text);
  opacity: 0; transition: all 0.4s; white-space: nowrap; pointer-events: none;
}
.state-badge.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">LUNA<span>SENSE</span><sub>LIVE SYSTEM DEMO</sub></div>
  <div class="header-right">
    <div class="status-pill"><div class="status-dot"></div>SYSTEM ARMED</div>
    <div class="status-pill" id="clock-pill">--:--</div>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchModule('light')">💡 LIGHT MODULE</button>
  <button class="tab-btn" onclick="switchModule('ac')">❄️ AC MODULE</button>
</div>

<!-- SCENARIO STRIP -->
<div class="scenario-strip" id="scenario-strip">
  <span class="scenario-strip-label">SCENARIO —</span>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: ROOM SCENE -->
  <div class="room-wrap">
    <div class="room-label">
      ROOM VISUALIZATION
      <span id="room-mode-label">STANDBY</span>
    </div>
    <div class="room-scene" id="room-scene">
      <div class="led-strip"><div class="led-fill" id="led-fill"></div></div>
      <div class="light-glow" id="light-glow"></div>

      <!-- AC elements -->
      <div class="ac-unit" id="ac-unit"><span class="ac-unit-label">AC — ON</span></div>
      <div class="ac-stream" id="ac-stream">
        <div class="stream-line"></div><div class="stream-line"></div>
        <div class="stream-line"></div><div class="stream-line"></div>
        <div class="stream-line"></div>
      </div>
      <div class="temp-display" id="temp-display">22°C</div>

      <div class="pir-cone" id="pir-cone"></div>
      <div class="radar-ring" id="radar-ring"></div>
      <div class="room-floor"></div>
      <div class="furniture-desk"></div>
      <div class="furniture-bed"></div>

      <div class="person" id="person">
        <div class="person-body">
          <div class="person-head"></div>
          <div class="person-torso"></div>
          <div class="person-legs">
            <div class="person-leg"></div><div class="person-leg"></div>
          </div>
        </div>
      </div>

      <div class="state-badge" id="state-badge"></div>
      <div class="mode-label" id="mode-label">OFF</div>

      <div class="sensor-badges">
        <div class="sensor-badge badge-pir"   id="badge-pir">PIR — IDLE</div>
        <div class="sensor-badge badge-radar" id="badge-radar">RADAR — IDLE</div>
        <div class="sensor-badge badge-ac"    id="badge-ac" style="display:none">AC — OFF</div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <!-- Flow -->
    <div class="flow-section">
      <div class="flow-title">SIGNAL FLOW</div>
      <div class="flow-nodes" id="flow-nodes">
        <!-- injected by JS -->
      </div>
    </div>

    <!-- AC stats (shown only in AC mode) -->
    <div class="ac-status-section" id="ac-stats" style="display:none">
      <div class="flow-title">AC STATUS</div>
      <div class="ac-status-row">
        <div class="ac-stat">
          <div class="ac-stat-val" id="ac-temp-val">--</div>
          <div class="ac-stat-label">TEMP °C</div>
        </div>
        <div class="ac-stat">
          <div class="ac-stat-val" id="ac-mode-val">--</div>
          <div class="ac-stat-label">MODE</div>
        </div>
        <div class="ac-stat">
          <div class="ac-stat-val" id="ac-speed-val">--</div>
          <div class="ac-stat-label">FAN</div>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="log-section">
      <div class="log-header">
        SYSTEM LOG
        <span class="log-clear" onclick="clearLog()">CLEAR</span>
      </div>
      <div class="log-body" id="log"></div>
    </div>
  </div>
</div>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));
let running = false;
let logCount = 0;
let activeModule = 'light';

/* ── CLOCK ── */
function tickClock() {
  const now = new Date();
  document.getElementById('clock-pill').textContent =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0');
}
tickClock(); setInterval(tickClock, 1000);

/* ── LOG ── */
function addLog(msg, type = '') {
  const log  = document.getElementById('log');
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const el   = document.createElement('div');
  el.className = `log-entry type-${type}`;
  el.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">&gt; ${msg}</span>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

/* ── FLOW NODES ── */
const lightNodes = [
  { id: 'fn-pir',   cls: 'node-pir',   name: 'PIR SENSOR',       val: 'IDLE' },
  { id: 'fn-radar', cls: 'node-radar',  name: 'MMWAVE RADAR',     val: 'IDLE' },
  { id: 'fn-esp',   cls: 'node-esp',    name: 'ESP32 LOGIC',      val: 'WAITING' },
  { id: 'fn-led',   cls: 'node-led',    name: 'LED / RELAY',      val: 'OFF' },
];
const acNodes = [
  { id: 'fn-pir',   cls: 'node-pir',   name: 'PIR SENSOR',       val: 'IDLE' },
  { id: 'fn-radar', cls: 'node-radar',  name: 'MMWAVE RADAR',     val: 'IDLE' },
  { id: 'fn-esp',   cls: 'node-esp',    name: 'ESP32 LOGIC',      val: 'WAITING' },
  { id: 'fn-ac',    cls: 'node-ac',     name: 'IR BLASTER → AC',  val: 'OFF' },
];

function buildFlow(nodes) {
  const container = document.getElementById('flow-nodes');
  container.innerHTML = '';
  nodes.forEach((n, i) => {
    const el = document.createElement('div');
    el.className = `flow-node ${n.cls}`;
    el.id = n.id + '-node';
    el.innerHTML = `<div class="flow-dot"></div><span class="flow-name">${n.name}</span><span class="flow-value" id="${n.id}-val">${n.val}</span>`;
    container.appendChild(el);
    if (i < nodes.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'flow-connector';
      conn.id = `conn-${i}`;
      container.appendChild(conn);
    }
  });
}

function setFlowNode(id, active, val) {
  const node = document.getElementById(id + '-node');
  const valEl = document.getElementById(id + '-val');
  if (!node) return;
  node.classList.toggle('active', active);
  if (valEl && val !== undefined) valEl.textContent = val;
}

function activateConnectors(count) {
  for (let i = 0; i < 4; i++) {
    const c = document.getElementById(`conn-${i}`);
    if (c) c.classList.toggle('active', i < count);
  }
}

/* ── MODULE SWITCH ── */
function switchModule(mod) {
  if (running) return;
  activeModule = mod;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (mod === 'light' && i === 0) || (mod === 'ac' && i === 1));
  });
  document.getElementById('ac-stats').style.display  = mod === 'ac' ? 'block' : 'none';
  document.getElementById('badge-ac').style.display  = mod === 'ac' ? 'flex' : 'none';
  buildFlow(mod === 'light' ? lightNodes : acNodes);
  buildScenarios(mod);
  reset();
  addLog(`Switched to ${mod === 'light' ? 'LIGHT' : 'AC'} module`, 'wifi');
}

/* ── SCENARIO BUTTONS ── */
const lightScenarios = [
  { id: 'btn-enter',    label: 'ENTER ROOM',       fn: () => scenarioEnterLight() },
  { id: 'btn-sitting',  label: 'SITTING STILL',    fn: () => scenarioSittingLight() },
  { id: 'btn-inact',   label: 'INACTIVITY OFF',   fn: () => scenarioInactLight() },
  { id: 'btn-anomaly',  label: 'ANOMALY ALERT',    fn: () => scenarioAnomaly() },
  { id: 'btn-leave',    label: 'LEAVE ROOM',       fn: () => scenarioLeaveLight() },
];
const acScenarios = [
  { id: 'btn-ac-on',    label: 'TURN AC ON',       fn: () => scenarioAcOn() },
  { id: 'btn-ac-cool',  label: 'COOL MODE',        fn: () => scenarioAcCool() },
  { id: 'btn-ac-empty', label: 'ROOM EMPTY TIMER', fn: () => scenarioAcEmpty() },
  { id: 'btn-ac-back',  label: 'PERSON RETURNS',   fn: () => scenarioAcReturn() },
];

function buildScenarios(mod) {
  const strip = document.getElementById('scenario-strip');
  strip.innerHTML = '<span class="scenario-strip-label">SCENARIO —</span>';
  const list = mod === 'light' ? lightScenarios : acScenarios;
  list.forEach(s => {
    const btn = document.createElement('button');
    btn.className = `scenario-btn ${mod === 'light' ? 'light-scenario' : 'ac-scenario'}`;
    btn.id = s.id;
    btn.textContent = s.label;
    btn.onclick = () => { if (!running) runScenario(s.fn); };
    strip.appendChild(btn);
  });
}

async function runScenario(fn) {
  running = true;
  reset();
  document.getElementById('log').innerHTML = '';
  await sleep(200);
  await fn();
  running = false;
}

/* ── HELPERS ── */
function setPIR(active, label = '') {
  const badge = document.getElementById('badge-pir');
  badge.className = `sensor-badge badge-pir ${active ? 'active' : ''}`;
  badge.textContent = active ? `PIR — ${label || 'MOTION'}` : 'PIR — IDLE';
  document.getElementById('pir-cone').classList.toggle('active', active);
  setFlowNode('fn-pir', active, active ? (label || 'MOTION') : 'IDLE');
}

function setRadar(active, label = '') {
  const badge = document.getElementById('badge-radar');
  badge.className = `sensor-badge badge-radar ${active ? 'active' : ''}`;
  badge.textContent = active ? `RADAR — ${label || 'PRESENT'}` : 'RADAR — IDLE';
  document.getElementById('radar-ring').classList.toggle('active', active);
  setFlowNode('fn-radar', active, active ? (label || 'PRESENT') : 'IDLE');
}

function setESP(label) {
  setFlowNode('fn-esp', label !== 'WAITING', label);
}

function setLight(mode, brightness, label) {
  const fill = document.getElementById('led-fill');
  const glow = document.getElementById('light-glow');
  const modeLabel = document.getElementById('mode-label');
  const roomLabel = document.getElementById('room-mode-label');
  fill.className = `led-fill ${mode !== 'off' ? 'on' : ''} ${mode}`;
  glow.className = `light-glow ${mode !== 'off' ? 'on' : ''} ${mode}`;
  modeLabel.textContent = label || mode.toUpperCase();
  roomLabel.textContent = mode !== 'off' ? label || mode.toUpperCase() : 'STANDBY';
  const colors = { warm:'var(--gold)', cool:'var(--cyan)', pastel:'#BDB2FF', alert:'var(--red)', off:'var(--muted)' };
  modeLabel.style.color = colors[mode] || 'var(--muted)';
  setFlowNode('fn-led', mode !== 'off', mode !== 'off' ? label || mode.toUpperCase() : 'OFF');
}

function setAC(on, temp, mode, speed) {
  document.getElementById('ac-unit').classList.toggle('on', on);
  document.getElementById('ac-stream').classList.toggle('on', on);
  const td = document.getElementById('temp-display');
  td.classList.toggle('on', on);
  td.textContent = temp + '°C';
  const badge = document.getElementById('badge-ac');
  badge.className = `sensor-badge badge-ac ${on ? 'active' : ''}`;
  badge.textContent = on ? `AC — ${temp}°C ${mode}` : 'AC — OFF';
  const tv = document.getElementById('ac-temp-val');
  const mv = document.getElementById('ac-mode-val');
  const sv = document.getElementById('ac-speed-val');
  if (tv) { tv.textContent = on ? temp : '--'; tv.className = `ac-stat-val ${on ? 'on' : ''}`; }
  if (mv) { mv.textContent = on ? mode.slice(0,4).toUpperCase() : '--'; mv.className = `ac-stat-val ${on ? 'on' : ''}`; }
  if (sv) { sv.textContent = on ? speed.slice(0,3).toUpperCase() : '--'; sv.className = `ac-stat-val ${on ? 'on' : ''}`; }
  setFlowNode('fn-ac', on, on ? `${temp}°C ${mode}` : 'OFF');
}

function setPerson(visible, pos = '') {
  const p = document.getElementById('person');
  p.className = `person ${visible ? 'visible' : ''} ${pos}`;
}

function setStateBadge(text, visible = true) {
  const b = document.getElementById('state-badge');
  b.textContent = text; b.className = `state-badge ${visible ? 'visible' : ''}`;
}

function reset() {
  setPIR(false); setRadar(false); setESP('WAITING');
  setLight('off', 0, 'OFF');
  setAC(false, 22, 'Cool', 'Med');
  setPerson(false); setStateBadge('', false);
  activateConnectors(0);
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
}

/* ════════════════════════════════════
   LIGHT SCENARIOS
════════════════════════════════════ */
async function scenarioEnterLight() {
  document.getElementById('btn-enter').classList.add('active');
  addLog('System armed — monitoring room', 'wifi');
  await sleep(600);
  addLog('PIR triggered — infrared heat signature detected', 'pir');
  setPIR(true, 'MOTION'); await sleep(500);
  addLog('ESP32 receives motion event from PIR', 'pir');
  setESP('MOTION RECV'); activateConnectors(1); await sleep(400);
  setPerson(true, '');
  addLog('mmWave radar — confirming human presence...', 'radar');
  setRadar(true, 'MOVING'); await sleep(500);
  addLog('Radar confirms presence — activating lights', 'radar');
  activateConnectors(2); await sleep(400);
  setESP('PERSON DETECTED'); activateConnectors(3); await sleep(300);
  addLog('Relay ON — lights activated at 90% brightness', 'light');
  setLight('warm', 90, 'WARM WHITE'); activateConnectors(4);
  setStateBadge('✓ Person detected — lights ON', true);
  addLog('✓ Light active — both sensors agree', 'light');
}

async function scenarioSittingLight() {
  document.getElementById('btn-sitting').classList.add('active');
  setPerson(true, 'at-desk'); setPIR(true, 'MOTION'); setLight('cool', 88, 'COOL WHITE');
  setESP('MONITORING'); activateConnectors(4);
  addLog('Person sitting still at desk', ''); await sleep(600);
  addLog('PIR → no new motion (person completely still)', 'pir');
  setPIR(false); await sleep(500);
  addLog('PIR blind to still person — would turn off light!', 'pir');
  setESP('PIR TIMEOUT?'); await sleep(500);
  addLog('mmWave LD2410 → detects micro-movements at 1.2m', 'radar');
  setRadar(true, 'STILL 1.2m'); await sleep(400);
  addLog('ESP32 → radar overrides PIR timeout', '');
  setESP('RADAR HOLD'); activateConnectors(4); await sleep(400);
  addLog('Light inactivity timer RESET by radar', 'light');
  addLog('✓ Light stays ON — mmWave saves the day', 'light');
  setStateBadge('✓ Still detected by mmWave — light held', true);
}

async function scenarioInactLight() {
  document.getElementById('btn-inact').classList.add('active');
  setPerson(true, ''); setLight('warm', 70, 'WARM WHITE');
  setESP('MONITORING'); activateConnectors(4);
  addLog('Person in room — light on', 'light'); await sleep(500);
  addLog('No movement detected by PIR...', 'pir');
  setPIR(false); await sleep(600);
  addLog('mmWave — person present but zero activity', 'radar');
  setRadar(true, 'STATIC'); await sleep(500);
  addLog('Inactivity timer started (15 mins in real system)', '');
  setESP('TIMER START'); setStateBadge('Inactivity timer running...', true); await sleep(600);
  addLog('Timer reached — light turning off (no activity)', 'light');
  setLight('dim', 25, 'DIMMING'); await sleep(800);
  setLight('off', 0, 'OFF'); setStateBadge('💤 No activity — light off', true);
  addLog('✓ Light off — person present but inactive (saving power)', 'light');
}

async function scenarioAnomaly() {
  document.getElementById('btn-anomaly').classList.add('active');
  setLight('off', 0, 'OFF'); setESP('ARMED');
  addLog('03:00 — room should be empty', 'wifi'); await sleep(700);
  addLog('⚠ PIR triggered at 03:00!', 'alert');
  setPIR(true, 'ALERT!'); setPerson(true, ''); await sleep(400);
  addLog('ESP32 → motion at 03:00 = ANOMALY threshold', 'alert');
  setESP('⚠ ANOMALY'); activateConnectors(2); await sleep(400);
  addLog('Radar → confirms unexpected presence at 03:00', 'alert');
  setRadar(true, 'ALERT!'); await sleep(300);
  setStateBadge('⚠ ANOMALY — unexpected movement!', true);
  setLight('alert', 100, 'ALERT RED'); activateConnectors(4); await sleep(400);
  addLog('Sending push notification to mobile app...', 'alert');
  await sleep(500);
  addLog('📱 Alert delivered to LunaSense app!', 'alert');
  addLog('✓ Anomaly logged — monitoring continues', 'alert');
}

async function scenarioLeaveLight() {
  document.getElementById('btn-leave').classList.add('active');
  setPerson(true, ''); setPIR(true, 'MOTION'); setRadar(true, 'PRESENT');
  setLight('warm', 75, 'WARM WHITE'); setESP('MONITORING'); activateConnectors(4);
  setStateBadge('Person leaving...', true); await sleep(500);
  addLog('Person moving toward exit', 'pir'); await sleep(600);
  addLog('PIR → last motion detected at door', 'pir'); await sleep(500);
  setPIR(false); setPerson(false);
  addLog('Radar cross-checking — scanning for presence...', 'radar'); await sleep(700);
  addLog('LD2410 → no presence detected, room clear', 'radar');
  setRadar(false); setESP('EMPTY ROOM'); activateConnectors(1); await sleep(400);
  addLog('Both sensors agree → room is empty', '');
  setStateBadge('Room empty — timer starting', true); await sleep(600);
  addLog('Auto-off timer counting down...', 'light'); await sleep(700);
  addLog('Timer expired → relay OFF', 'light');
  setLight('off', 0, 'OFF'); activateConnectors(0);
  setStateBadge('', false); setESP('STANDBY');
  addLog('✓ Light off — system armed, waiting for motion', 'light');
}

/* ════════════════════════════════════
   AC SCENARIOS
════════════════════════════════════ */
async function scenarioAcOn() {
  document.getElementById('btn-ac-on').classList.add('active');
  addLog('User taps AC ON in LunaSense app', 'ac'); await sleep(500);
  addLog('App → POST /ac/on to ESP32 over WiFi', 'ac');
  setESP('RECV /ac/on'); activateConnectors(1); await sleep(500);
  addLog('ESP32 → IR blaster sends ON signal to AC', 'ac');
  activateConnectors(2); await sleep(400);
  addLog('AC receives IR signal — powering on', 'ac');
  setAC(true, 22, 'Cool', 'Med');
  setRadar(true, 'PRESENT'); setPIR(true, 'MOTION'); setPerson(true, '');
  activateConnectors(4); await sleep(400);
  addLog('✓ AC ON — Cool mode, 22°C, Med fan speed', 'ac');
  setStateBadge('✓ AC ON — 22°C Cool', true);
}

async function scenarioAcCool() {
  document.getElementById('btn-ac-cool').classList.add('active');
  setAC(true, 24, 'Cool', 'Med'); setPerson(true, '');
  setESP('MONITORING'); activateConnectors(4);
  addLog('Current temp: 24°C — user sets to 20°C', 'ac'); await sleep(500);
  addLog('App → POST /ac/temp?value=20 to ESP32', 'ac');
  setESP('RECV /ac/temp'); activateConnectors(2); await sleep(600);
  addLog('ESP32 → IR blaster sends TEMP DOWN × 4', 'ac');
  for (let t = 23; t >= 20; t--) {
    setAC(true, t, 'Cool', 'Med');
    addLog(`IR pulse → temp set to ${t}°C`, 'ac');
    await sleep(400);
  }
  activateConnectors(4); await sleep(300);
  addLog('User switches to FAN mode', 'ac');
  setESP('RECV /ac/mode'); await sleep(400);
  addLog('IR blast → MODE: FAN', 'ac');
  setAC(true, 20, 'Fan', 'High'); await sleep(300);
  addLog('✓ AC — 20°C, Fan mode, High speed', 'ac');
  setStateBadge('✓ 20°C · Fan · High', true);
}

async function scenarioAcEmpty() {
  document.getElementById('btn-ac-empty').classList.add('active');
  setAC(true, 22, 'Cool', 'Med'); setPerson(true, '');
  setPIR(true, 'PRESENT'); setRadar(true, 'PRESENT'); setESP('MONITORING');
  activateConnectors(4); setStateBadge('Person leaving...', true);
  addLog('AC running — person present', 'ac'); await sleep(600);
  addLog('Person walks out — PIR detects exit motion', 'pir');
  setPerson(false); await sleep(500);
  addLog('PIR goes idle — no more movement', 'pir'); setPIR(false); await sleep(400);
  addLog('mmWave radar scanning — is room truly empty?', 'radar');
  await sleep(700);
  addLog('LD2410 → CONFIRMED: zero presence detected', 'radar');
  setRadar(false); setESP('EMPTY ROOM'); activateConnectors(1); await sleep(400);
  addLog('Both sensors agree — room empty', '');
  setStateBadge('Room empty — AC timer started', true);
  addLog('AC empty-room timer started (10 mins real system)', 'ac'); await sleep(800);
  addLog('Timer expired → ESP32 sends AC OFF IR signal', 'ac');
  setESP('SEND AC OFF'); activateConnectors(2); await sleep(500);
  setAC(false, 22, 'Cool', 'Med'); activateConnectors(0);
  setStateBadge('', false); setESP('STANDBY');
  addLog('✓ AC off — no one home, energy saved', 'ac');
}

async function scenarioAcReturn() {
  document.getElementById('btn-ac-back').classList.add('active');
  setAC(false, 22, 'Cool', 'Med'); setESP('STANDBY');
  addLog('Room empty — AC was off', 'ac'); await sleep(500);
  addLog('PIR triggered — someone entering room!', 'pir');
  setPIR(true, 'MOTION'); setPerson(true, ''); await sleep(400);
  addLog('ESP32 → motion detected, room no longer empty', 'pir');
  setESP('MOTION RECV'); activateConnectors(2); await sleep(400);
  addLog('Radar confirms human presence', 'radar');
  setRadar(true, 'PRESENT'); activateConnectors(3); await sleep(400);
  addLog('App sends AC ON → ESP32 → IR blast to IFB', 'ac');
  setESP('SEND AC ON'); activateConnectors(4); await sleep(500);
  setAC(true, 22, 'Cool', 'Med');
  addLog('✓ AC back on — welcome home!', 'ac');
  setStateBadge('✓ Person returned — AC ON', true);
}

/* INIT */
buildFlow(lightNodes);
buildScenarios('light');
reset();
addLog('LunaSense demo initialized', 'wifi');
addLog('Select a scenario above to begin', '');
</script>
